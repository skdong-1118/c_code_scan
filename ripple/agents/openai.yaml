display_name: Ripple
short_description: 使用 CodeGraph MCP 的模型驱动 C 回归影响评审。
default_prompt: 使用 ripple skill 以交互式流程评审当前分支最后一次 C 代码提交。先清理 .impact-scan，只检查 HEAD~1..HEAD，根据 git diff 推断 scope，使用 CodeGraph MCP 查询 definition、references、callers、callees、callchains，每一步都写 Markdown 产物，并且只有证据步骤完成后才生成最终中文 reviewer 风格报告。
