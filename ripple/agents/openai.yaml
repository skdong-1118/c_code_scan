display_name: Ripple
short_description: Model-driven C regression review using CodeGraph MCP.
default_prompt: Use the ripple skill to review the latest C commit in interactive guided mode. Do not run ripple_scan.py. Start by clearing .impact-scan, inspect only HEAD~1..HEAD, infer scope from git diff, use CodeGraph MCP tools for definitions/references/callers/callees/callchains, write each Markdown artifact, and generate the final Chinese reviewer-style report only after the evidence steps are complete.
